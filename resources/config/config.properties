# ─────────────────────────────────────────────────
# SDD FRAMEWORK - Configuration
# ─────────────────────────────────────────────────

# Application URLs (UPDATE THESE)
app.base.url=https://your-app.com
api.base.url=https://api.your-app.com
swagger.url=https://your-app.com/v3/api-docs

# Browser Settings
browser=chrome
headless=false

# Test Timeouts (seconds)
implicit.wait=10
explicit.wait=15
page.load.timeout=30

# Jira Integration (optional)
jira.base.url=https://your-domain.atlassian.net
jira.api.token=YOUR_JIRA_API_TOKEN_HERE
jira.project.key=PROJ

# Reporting
screenshot.on.failure=true
allure.results.dir=output/allure-results
